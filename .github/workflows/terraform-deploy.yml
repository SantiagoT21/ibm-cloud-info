name: Build, Push and Deploy to IBM Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  repository_dispatch:
    types: [docker-image-updated]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'build-and-deploy'
        type: choice
        options:
          - build-and-deploy
          - deploy-only
          - destroy

env:
  TF_VERSION: '1.6.0'
  TF_WORKING_DIR: './terraform'
  IMAGE_NAME: 'ibm-cloud-info'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' || 
      github.event.inputs.action == 'build-and-deploy'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud --version
          ibmcloud plugin install container-registry -f

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r "${{ secrets.IBM_CLOUD_REGION }}"
          ibmcloud cr login

      - name: Check and create namespace if needed
        run: |
          NAMESPACE="${{ secrets.ICR_NAMESPACE }}"
          if ! ibmcloud cr namespace-list | grep -q "^${NAMESPACE}$"; then
            echo "Creating namespace ${NAMESPACE}..."
            ibmcloud cr namespace-add "${NAMESPACE}"
          else
            echo "Namespace ${NAMESPACE} already exists"
          fi

      - name: Extract registry credentials
        id: registry-creds
        run: |
          # Get the token from ibmcloud cr login
          TOKEN=$(ibmcloud cr token-get | grep Token | awk '{print $2}')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "registry=icr.io" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to IBM Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-creds.outputs.registry }}
          username: iamapikey
          password: ${{ secrets.IBM_CLOUD_API_KEY }}

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE_TAG="icr.io/${{ secrets.ICR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Building image: ${IMAGE_TAG}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify image in registry
        run: |
          echo "Waiting for image to be available..."
          sleep 10
          ibmcloud cr images --restrict "${{ secrets.ICR_NAMESPACE }}/${{ env.IMAGE_NAME }}"

      - name: Scan image for vulnerabilities
        run: |
          echo "Scanning image for vulnerabilities..."
          ibmcloud cr vulnerability-assessment "${{ steps.meta.outputs.tags }}" || true

      - name: Image Build Summary
        run: |
          echo "## 🐳 Docker Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** IBM Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** \`${{ secrets.ICR_NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Built by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: |
      always() && 
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          ibmcloud_api_key    = "${{ secrets.IBM_CLOUD_API_KEY }}"
          region              = "${{ secrets.IBM_CLOUD_REGION }}"
          resource_group_name = "${{ secrets.IBM_CLOUD_RESOURCE_GROUP }}"
          project_name        = "ibm-cloud-info-v11"
          app_name            = "ibm-cloud-info-app-v11"
          container_image     = "icr.io/${{ secrets.ICR_NAMESPACE }}/ibm-cloud-info:latest"
          container_port      = 8080
          cpu                 = "0.25"
          memory              = "0.5G"
          min_scale           = 0
          max_scale           = 10
          request_timeout     = 300
          tags                = ["terraform", "code-engine", "ibm-cloud-info", "github-actions"]
          EOF

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: false

      - name: Save Plan Output
        if: github.event_name == 'pull_request'
        run: |
          terraform show -no-color tfplan > plan_output.txt

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'repository_dispatch') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build-and-deploy') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy-only')
        run: terraform apply -auto-approve -input=false tfplan

      - name: Get Terraform Outputs
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'repository_dispatch') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy')
        id: outputs
        run: |
          echo "app_url=$(terraform output -raw app_url)" >> $GITHUB_OUTPUT
          echo "app_status=$(terraform output -raw app_status)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Deployment Summary
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'repository_dispatch') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy')
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Application successfully deployed to IBM Cloud Code Engine!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Application URL:** ${{ steps.outputs.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** \`${{ steps.outputs.outputs.app_status }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** \`${{ secrets.IBM_CLOUD_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Image:** \`icr.io/${{ secrets.ICR_NAMESPACE }}/ibm-cloud-info:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Access Your Application" >> $GITHUB_STEP_SUMMARY
          echo "Visit: [${{ steps.outputs.outputs.app_url }}](${{ steps.outputs.outputs.app_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Deployed by: @${{ github.actor }} at $(date -u)*" >> $GITHUB_STEP_SUMMARY

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -f terraform.tfvars
          rm -f tfplan
          rm -f plan_output.txt

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          ibmcloud_api_key    = "${{ secrets.IBM_CLOUD_API_KEY }}"
          region              = "${{ secrets.IBM_CLOUD_REGION }}"
          resource_group_name = "${{ secrets.IBM_CLOUD_RESOURCE_GROUP }}"
          project_name        = "ibm-cloud-info-v11"
          app_name            = "ibm-cloud-info-app-v11"
          container_image     = "icr.io/${{ secrets.ICR_NAMESPACE }}/ibm-cloud-info:latest"
          container_port      = 8080
          cpu                 = "0.25"
          memory              = "0.5G"
          min_scale           = 0
          max_scale           = 10
          request_timeout     = 300
          tags                = ["terraform", "code-engine", "ibm-cloud-info", "github-actions"]
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

      - name: Destroy Summary
        run: |
          echo "## 🗑️ Resources Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All IBM Cloud Code Engine resources have been destroyed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Destroyed by: @${{ github.actor }} at $(date -u)*" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -f terraform.tfvars

